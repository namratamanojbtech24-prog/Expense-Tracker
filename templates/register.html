<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SpendWise</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<div class="auth-page">

  <!-- Logo -->
  <div class="auth-logo-wrap">
    <div class="auth-logo-icon">↘</div>
    <div class="auth-logo-name">SpendWise</div>
    <div class="auth-tagline">Track every paisa, save every rupee</div>
  </div>

  <!-- Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <a href="{{ url_for('login') }}" class="auth-tab">Sign In</a>
      <a href="{{ url_for('register') }}" class="auth-tab active">Create Account</a>
    </div>

    <div class="auth-form-body">

      {% if errors %}
        {% for err in errors %}
          <div class="form-error">{{ err }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{{ url_for('register') }}">

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input class="form-control" type="text" id="username" name="username"
                   value="{{ username }}" placeholder="your_username" required autofocus />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉</span>
            <input class="form-control" type="email" id="email" name="email"
                   value="{{ email }}" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-icon-wrap" style="position:relative;">
            <span class="input-icon">🔒</span>
            <input class="form-control" type="password" id="password" name="password"
                   placeholder="Min. 6 characters" required style="padding-right:44px;" />
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px; padding:14px;">
          Create Account
        </button>
      </form>

    </div>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}
</script>

</body>
</html>
